version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vpn_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vpn_3wg
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vpn_network

  redis:
    image: redis:7-alpine
    container_name: vpn_redis
    ports:
      - "6379:6379"
    networks:
      - vpn_network

  backend:
    build: .
    container_name: vpn_backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=vpn_3wg
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=your_super_secret_key
    depends_on:
      - postgres
      - redis
    networks:
      - vpn_network

volumes:
  postgres_data:

networks:
  vpn_network:
    driver: bridge
